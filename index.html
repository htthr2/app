<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Survival Shooter</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
  }
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    margin-left: -10px;
    margin-top: -10px;
    border: 2px solid white;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div id="ui">HP: <span id="hp">100</span></div>
<div id="crosshair"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 0, y: 0, angle: 0, hp: 100 };
let bullets = [];
let enemies = [];

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", e => {
  player.angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
});

canvas.addEventListener("click", shoot);

function shoot() {
  bullets.push({
    x: player.x,
    y: player.y,
    dx: Math.cos(player.angle) * 10,
    dy: Math.sin(player.angle) * 10
  });
}

function spawnEnemy() {
  enemies.push({
    x: player.x + (Math.random() - 0.5) * 800,
    y: player.y + (Math.random() - 0.5) * 800,
    size: 20
  });
}
setInterval(spawnEnemy, 1500);

function update() {
  if(keys["w"]) {
    player.x += Math.cos(player.angle) * 3;
    player.y += Math.sin(player.angle) * 3;
  }
  if(keys["s"]) {
    player.x -= Math.cos(player.angle) * 3;
    player.y -= Math.sin(player.angle) * 3;
  }
  if(keys["a"]) {
    player.x += Math.cos(player.angle - Math.PI/2) * 3;
    player.y += Math.sin(player.angle - Math.PI/2) * 3;
  }
  if(keys["d"]) {
    player.x += Math.cos(player.angle + Math.PI/2) * 3;
    player.y += Math.sin(player.angle + Math.PI/2) * 3;
  }

  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  enemies.forEach(e => {
    let angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * 1.5;
    e.y += Math.sin(angle) * 1.5;

    if(Math.hypot(player.x - e.x, player.y - e.y) < 20) {
      player.hp -= 0.5;
    }
  });

  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
        enemies.splice(ei,1);
        bullets.splice(bi,1);
      }
    });
  });

  document.getElementById("hp").textContent = Math.floor(player.hp);
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // カメラ中心（プレイヤー視点）
  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;

  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.fillRect(e.x - camX - 10, e.y - camY - 10, 20, 20);
  });

  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x - camX, b.y - camY, 5, 5);
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
