<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D風 野球対戦ゲーム</title>
<style>
  body { margin: 0; overflow: hidden; background: linear-gradient(#87ceeb,#2e8b57); }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
    font-size: 18px;
  }
  #btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 40px;
    font-size: 20px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>
<div id="ui">Player: <span id="p1">0</span> | CPU: <span id="p2">0</span></div>
<button id="btn">打つ！</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: 0, y: 0, z: 1, speed: 0.02, active: false };
let p1Score = 0;
let p2Score = 0;
let turn = "player";

function pitch() {
  ball.x = canvas.width/2 + (Math.random()-0.5)*200;
  ball.y = canvas.height/2;
  ball.z = 1;
  ball.speed = 0.02 + Math.random()*0.02;
  ball.active = true;
}

setInterval(pitch, 2500);

function swing() {
  if(!ball.active || turn !== "player") return;

  if(ball.z < 0.2) {
    p1Score++;
  }
  ball.active = false;
  turn = "cpu";
  setTimeout(cpuTurn, 1000);
}

document.getElementById("btn").onclick = swing;
canvas.addEventListener("touchstart", swing);

function cpuTurn() {
  if(Math.random() > 0.5) {
    p2Score++;
  }
  turn = "player";
}

function update() {
  if(ball.active) {
    ball.z -= ball.speed;
    if(ball.z <= 0) {
      ball.active = false;
    }
  }

  document.getElementById("p1").textContent = p1Score;
  document.getElementById("p2").textContent = p2Score;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // グラウンド（遠近感）
  ctx.fillStyle = "#2e8b57";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(canvas.width/2, canvas.height/2);
  ctx.closePath();
  ctx.fill();

  // ボール（3D風：近づくと大きくなる）
  if(ball.active) {
    let size = 10 / ball.z;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y + (1-ball.z)*300, size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  // バット位置
  ctx.fillStyle = "white";
  ctx.fillRect(canvas.width/2 - 60, canvas.height - 120, 120, 10);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
