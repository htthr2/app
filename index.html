<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball Game</title>
<style>
  body { margin: 0; overflow: hidden; background: linear-gradient(#4ec0ff,#1e7f2d); }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
    font-size: 18px;
  }
  #btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 40px;
    font-size: 20px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<button id="btn">打つ！</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: canvas.width/2, y: 0, vy: 0, active: false };
let score = 0;

function pitch() {
  ball.x = canvas.width/2 + (Math.random()-0.5)*200;
  ball.y = 0;
  ball.vy = 5 + Math.random()*3;
  ball.active = true;
}

setInterval(pitch, 2000);

document.getElementById("btn").addEventListener("click", swing);
canvas.addEventListener("touchstart", swing);

function swing() {
  if(!ball.active) return;

  // タイミング判定
  let hitZone = canvas.height - 150;
  if(Math.abs(ball.y - hitZone) < 40) {
    score++;
    document.getElementById("score").textContent = score;
    ball.active = false;
  }
}

function update() {
  if(ball.active) {
    ball.y += ball.vy;
    if(ball.y > canvas.height) {
      ball.active = false;
    }
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // バット位置（目安）
  ctx.fillStyle = "white";
  ctx.fillRect(canvas.width/2 - 50, canvas.height - 150, 100, 10);

  // ボール
  if(ball.active) {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
