<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Shooter</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div id="ui">HP: <span id="hp">100</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height/2, size: 20, hp: 100 };
let bullets = [];
let enemies = [];

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.addEventListener("click", shoot);

function shoot(e) {
  let angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
  bullets.push({
    x: player.x,
    y: player.y,
    dx: Math.cos(angle)*8,
    dy: Math.sin(angle)*8
  });
}

function spawnEnemy() {
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: 20
  });
}
setInterval(spawnEnemy, 1500);

function update() {
  if(keys["w"]) player.y -= 4;
  if(keys["s"]) player.y += 4;
  if(keys["a"]) player.x -= 4;
  if(keys["d"]) player.x += 4;

  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  enemies.forEach(e => {
    let angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle)*1.5;
    e.y += Math.sin(angle)*1.5;

    if(Math.hypot(player.x - e.x, player.y - e.y) < 20) {
      player.hp -= 1;
    }
  });

  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
        enemies.splice(ei,1);
        bullets.splice(bi,1);
      }
    });
  });

  document.getElementById("hp").textContent = player.hp;
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x-10, player.y-10, 20, 20);

  ctx.fillStyle = "yellow";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));

  ctx.fillStyle = "red";
  enemies.forEach(e => ctx.fillRect(e.x-10, e.y-10, 20, 20));
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
