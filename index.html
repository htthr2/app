<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>野球ゲーム（守備強化）</title>
<style>
  body { margin: 0; overflow: hidden; background: linear-gradient(#87ceeb,#2e8b57); }
  canvas { display: block; }
  #msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    font-size: 40px;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div id="msg"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: 0, y: 0, z: 1, speed: 0.02, active: false };
let hitBall = null;
let message = "";

let fielders = [
  {x: canvas.width/2 - 100, y: canvas.height/2},
  {x: canvas.width/2, y: canvas.height/2 - 50},
  {x: canvas.width/2 + 100, y: canvas.height/2}
];

function pitch() {
  ball.x = canvas.width/2 + (Math.random()-0.5)*200;
  ball.y = canvas.height/3;
  ball.z = 1;
  ball.speed = 0.02 + Math.random()*0.02;
  ball.active = true;
  message = "";
}
setInterval(pitch, 2500);

canvas.addEventListener("click", swing);
canvas.addEventListener("touchstart", swing);

function swing() {
  if(!ball.active) return;

  if(ball.z < 0.25) {
    hitBall = {
      x: canvas.width/2,
      y: canvas.height - 100,
      vx: (ball.x - canvas.width/2)/20,
      vy: -8,
      gravity: 0.3
    };
  }

  ball.active = false;
}

function update() {
  if(ball.active) {
    ball.z -= ball.speed;
    if(ball.z <= 0) ball.active = false;
  }

  if(hitBall) {
    hitBall.x += hitBall.vx;
    hitBall.y += hitBall.vy;
    hitBall.vy += hitBall.gravity;

    // 守備が追いかける
    fielders.forEach(f => {
      let angle = Math.atan2(hitBall.y - f.y, hitBall.x - f.x);
      f.x += Math.cos(angle) * 1.5;
      f.y += Math.sin(angle) * 1.5;

      // キャッチ判定
      if(Math.hypot(hitBall.x - f.x, hitBall.y - f.y) < 20) {
        hitBall = null;
        message = "アウト！";
      }
    });

    // 地面に落ちたらヒット
    if(hitBall && hitBall.y > canvas.height) {
      hitBall = null;
      message = "ヒット！";
    }
  }

  document.getElementById("msg").textContent = message;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // グラウンド
  ctx.fillStyle = "#2e8b57";
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height/2);
  ctx.lineTo(canvas.width/2 + 200, canvas.height);
  ctx.lineTo(canvas.width/2 - 200, canvas.height);
  ctx.closePath();
  ctx.fill();

  // 守備
  ctx.fillStyle = "blue";
  fielders.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, 10, 0, Math.PI*2);
    ctx.fill();
  });

  // 投球
  if(ball.active) {
    let size = 10 / ball.z;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y + (1-ball.z)*300, size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  // 打球
  if(hitBall) {
    ctx.beginPath();
    ctx.arc(hitBall.x, hitBall.y, 8, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
