<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超進化 野球ゲーム</title>
<style>
  body { margin: 0; overflow: hidden; background: linear-gradient(#87ceeb,#2e8b57); }
  canvas { display: block; }
  #btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 40px;
    font-size: 20px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>
<button id="btn">スイング！</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: 0, y: 0, z: 1, speed: 0.02, active: false };
let hitBall = null;
let swingAnim = 0;
let shake = 0;
let touchStartX = 0;
let swipePower = 0;

function pitch() {
  ball.x = canvas.width/2 + (Math.random()-0.5)*200;
  ball.y = canvas.height/3;
  ball.z = 1;
  ball.speed = 0.02 + Math.random()*0.02;
  ball.active = true;
}
setInterval(pitch, 2500);

canvas.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
});

canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - touchStartX;
  swipePower = dx / 50;
  swing();
});

function swing() {
  if(!ball.active) return;

  swingAnim = 10;
  shake = 10;

  if(ball.z < 0.25) {
    let direction = (ball.x - canvas.width/2) / 100 + swipePower;
    let power = (0.3 - ball.z) * 20 + Math.abs(swipePower)*2;

    hitBall = {
      x: canvas.width/2,
      y: canvas.height - 120,
      vx: direction * 5,
      vy: -power,
      gravity: 0.3
    };
  }

  ball.active = false;
}

document.getElementById("btn").onclick = swing;

function update() {
  if(ball.active) {
    ball.z -= ball.speed;
    if(ball.z <= 0) ball.active = false;
  }

  if(hitBall) {
    hitBall.x += hitBall.vx;
    hitBall.y += hitBall.vy;
    hitBall.vy += hitBall.gravity;

    // 守備キャッチ
    let fielderX = canvas.width/2;
    let fielderY = canvas.height/2;
    if(Math.hypot(hitBall.x - fielderX, hitBall.y - fielderY) < 30) {
      hitBall = null; // アウト
    }

    if(hitBall && hitBall.y > canvas.height) {
      hitBall = null;
    }
  }

  if(swingAnim > 0) swingAnim--;
  if(shake > 0) shake--;
}

function drawBat() {
  ctx.save();
  ctx.translate(canvas.width/2 + 100, canvas.height - 100);

  let angle = -0.5;
  if(swingAnim > 0) {
    angle = -0.5 + (10 - swingAnim) * 0.2;
  }

  ctx.rotate(angle);
  ctx.fillStyle = "#c69c6d";
  ctx.fillRect(-10, -80, 20, 160);
  ctx.restore();
}

function draw() {
  let offsetX = (Math.random()-0.5)*shake*2;
  let offsetY = (Math.random()-0.5)*shake*2;

  ctx.setTransform(1,0,0,1,offsetX,offsetY);
  ctx.clearRect(-offsetX,-offsetY,canvas.width,canvas.height);

  // グラウンド
  ctx.fillStyle = "#2e8b57";
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height/2);
  ctx.lineTo(canvas.width/2 + 200, canvas.height);
  ctx.lineTo(canvas.width/2 - 200, canvas.height);
  ctx.closePath();
  ctx.fill();

  // 守備
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, 15, 0, Math.PI*2);
  ctx.fill();

  // 投球
  if(ball.active) {
    let size = 10 / ball.z;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y + (1-ball.z)*300, size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  // 打球
  if(hitBall) {
    ctx.beginPath();
    ctx.arc(hitBall.x, hitBall.y, 8, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }

  drawBat();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
