<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D風 ランゲーム（FPS視点）</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div id="ui">距離: <span id="dist">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 0, lane: 1 }; // 0=左,1=中央,2=右
let obstacles = [];
let speed = 6;
let distance = 0;
let gameOver = false;

// 操作（スマホ対応）
canvas.addEventListener("touchstart", e => {
  let x = e.touches[0].clientX;
  if(x < canvas.width/2) player.lane--;
  else player.lane++;
  player.lane = Math.max(0, Math.min(2, player.lane));
});

// PC用
window.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") player.lane--;
  if(e.key === "ArrowRight") player.lane++;
  player.lane = Math.max(0, Math.min(2, player.lane));
});

function spawnObstacle() {
  obstacles.push({
    lane: Math.floor(Math.random()*3),
    z: 1
  });
}
setInterval(spawnObstacle, 1200);

function update() {
  if(gameOver) return;

  distance += 1;

  obstacles.forEach(o => {
    o.z -= 0.02 * speed/6;

    // 衝突判定
    if(o.z < 0.1 && o.lane === player.lane) {
      gameOver = true;
    }
  });

  obstacles = obstacles.filter(o => o.z > 0);

  document.getElementById("dist").textContent = distance;
}

function drawRoad() {
  ctx.fillStyle = "#222";
  ctx.beginPath();
  ctx.moveTo(canvas.width*0.3, canvas.height);
  ctx.lineTo(canvas.width*0.7, canvas.height);
  ctx.lineTo(canvas.width*0.55, canvas.height*0.4);
  ctx.lineTo(canvas.width*0.45, canvas.height*0.4);
  ctx.closePath();
  ctx.fill();

  // レーン線
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  for(let i=1;i<=2;i++){
    let t = i/3;
    ctx.beginPath();
    ctx.moveTo(canvas.width*(0.3+t*0.4), canvas.height);
    ctx.lineTo(canvas.width*(0.45+t*0.1), canvas.height*0.4);
    ctx.stroke();
  }
}

function laneToX(lane, z) {
  let base = canvas.width/2;
  let offset = (lane-1)*100*(1/z);
  return base + offset;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawRoad();

  // 障害物（3D風）
  obstacles.forEach(o => {
    let size = 40 / o.z;
    let x = laneToX(o.lane, o.z);
    let y = canvas.height*0.7 + (1-o.z)*200;

    ctx.fillStyle = "red";
    ctx.fillRect(x-size/2, y-size/2, size, size);
  });

  if(gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
