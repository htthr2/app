<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進化版 野球ゲーム（走塁あり）</title>
<style>
  body { margin: 0; overflow: hidden; background: linear-gradient(#87ceeb,#2e8b57); }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
  }
  #btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px 40px;
    font-size: 20px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>
<div id="ui">
Score: <span id="score">0</span> | 塁: <span id="base">0</span>
</div>
<button id="btn">打つ！</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ball = { x: 0, y: 0, z: 1, speed: 0.02, active: false };
let score = 0;
let base = 0; // 何塁にいるか
let runnerX = canvas.width/2;
let runnerY = canvas.height - 120;
let moving = false;
let targetBase = 0;

function pitch() {
  ball.x = canvas.width/2 + (Math.random()-0.5)*200;
  ball.y = canvas.height/2;
  ball.z = 1;
  ball.speed = 0.02 + Math.random()*0.02;
  ball.active = true;
}
setInterval(pitch, 2500);

function swing() {
  if(!ball.active) return;

  let result = "miss";

  if(ball.z < 0.25) {
    if(ball.z < 0.1) {
      result = "homerun";
      targetBase = 4;
    } else if(ball.z < 0.18) {
      result = "double";
      targetBase = 2;
    } else {
      result = "single";
      targetBase = 1;
    }
  }

  if(result !== "miss") {
    moving = true;
  }

  ball.active = false;
}

document.getElementById("btn").onclick = swing;
canvas.addEventListener("touchstart", swing);

function update() {
  if(ball.active) {
    ball.z -= ball.speed;
    if(ball.z <= 0) ball.active = false;
  }

  // 走塁
  if(moving) {
    runnerX += 2;
    if(runnerX > canvas.width/2 + targetBase*100) {
      base = targetBase;
      moving = false;

      if(base >= 4) {
        score++;
        base = 0;
        runnerX = canvas.width/2;
      }
    }
  }

  document.getElementById("score").textContent = score;
  document.getElementById("base").textContent = base;
}

function drawBase(x,y) {
  ctx.fillStyle = "white";
  ctx.fillRect(x-10,y-10,20,20);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // グラウンド
  ctx.fillStyle = "#2e8b57";
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height/2);
  ctx.lineTo(canvas.width/2 + 200, canvas.height/2 + 200);
  ctx.lineTo(canvas.width/2, canvas.height/2 + 400);
  ctx.lineTo(canvas.width/2 - 200, canvas.height/2 + 200);
  ctx.closePath();
  ctx.fill();

  // 塁
  drawBase(canvas.width/2, canvas.height/2 + 350); // home
  drawBase(canvas.width/2 + 150, canvas.height/2 + 200); // 1塁
  drawBase(canvas.width/2, canvas.height/2 + 50); // 2塁
  drawBase(canvas.width/2 - 150, canvas.height/2 + 200); // 3塁

  // ランナー
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(runnerX, runnerY, 10, 0, Math.PI*2);
  ctx.fill();

  // ボール
  if(ball.active) {
    let size = 10 / ball.z;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y + (1-ball.z)*300, size, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
